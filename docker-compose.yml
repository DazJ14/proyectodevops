services:
  web:
    build: .
    ports:
      - "5000:5000"
    networks:
      - app_network

  api-extra:
    image: hashicorp/http-echo
    command: "-text='{\"msg\": \"Servicio secundario activo\", \"estado\": \"en_linea\"}'"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge